<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Formatted Resumes - BW Tools</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <div class="header-row">
        <div>
          <h1>Formatted Resumes</h1>
          <p class="subtitle">Applications with AI Formatted Resume Code</p>
        </div>
        <a href="/logout" class="btn btn-secondary">Log Out</a>
      </div>
    </header>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by candidate name..." oninput="onSearch()">
    </div>

    <div class="controls">
      <span id="appCount" class="count"></span>
      <button id="refreshBtn" class="btn btn-secondary" onclick="clearSearch()">Refresh</button>
    </div>

    <div id="loading" class="loading">Loading applications...</div>
    <div id="error" class="error" style="display:none"></div>

    <table id="appsTable" style="display:none">
      <thead>
        <tr>
          <th>Candidate</th>
          <th>Client</th>
          <th>Role</th>
          <th>Created</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="appsBody"></tbody>
    </table>

    <div id="pagination" class="pagination" style="display:none">
      <button id="loadMoreBtn" class="btn btn-secondary" onclick="loadMore()">Load More</button>
    </div>
  </div>

  <div id="modal" class="modal" style="display:none">
    <div class="modal-content">
      <div id="modalSpinner" class="spinner"></div>
      <p id="modalText">Generating resume...</p>
      <a id="modalLink" href="#" target="_blank" style="display:none" class="btn btn-primary">Open Document</a>
      <button id="modalClose" class="btn btn-secondary" style="display:none" onclick="closeModal()">Close</button>
    </div>
  </div>

  <script src="resumes.js"></script>
</body>
</html>
